function updateCameraFromOrbit() {
  orbitState.theta += (orbitState.targetTheta - orbitState.theta) * 0.08;
  orbitState.phi += (orbitState.targetPhi - orbitState.phi) * 0.08;
  orbitState.radius += (orbitState.targetRadius - orbitState.radius) * 0.08;
  orbitState.phi = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, orbitState.phi));

  camera.position.x = orbitState.radius * Math.sin(orbitState.theta) * Math.cos(orbitState.phi);
  camera.position.y = orbitState.radius * Math.sin(orbitState.phi);
  camera.position.z = orbitState.radius * Math.cos(orbitState.theta) * Math.cos(orbitState.phi);
  camera.lookAt(0, 0, 0);
}

// ── Force-Directed Layout ───────────────────────────────────────────
class ForceGraph {
  constructor() {
    this.nodes = new Map();
    this.edges = [];
    this.alpha = 1.0;
    this.alphaDecay = 0.0005;
    this.alphaMin = 0.001;
    this.alphaTarget = 0;
    this.velocityDecay = 0.6;
    this.centerStrength = 0.01;
    this.repulsionStrength = 800;
    this.springLength = 80;
    this.springStrength = 0.06;
    this.categoryClusterStrength = 0.015;
  }

  addNode(id, data) {
    const angle = Math.random() * Math.PI * 2;
    const radius = 80 + Math.random() * 160;
    this.nodes.set(id, {
      ...data,
      x: Math.cos(angle) * radius,
      y: Math.sin(angle) * radius,
      z: (Math.random() - 0.5) * 60,
      vx: 0, vy: 0, vz: 0,
      fx: null, fy: null, fz: null,
    });
  }

  addEdge(source, target, data) {
    this.edges.push({ source, target, ...data });
  }

  tick() {
    if (this.alpha < this.alphaMin) return;
    this.alpha += (this.alphaTarget - this.alpha) * this.alphaDecay;

    const nodeArr = [...this.nodes.values()];
    const n = nodeArr.length;

    // Repulsion (Barnes-Hut would be better for 100+ nodes, but brute force is fine for ~45)
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const a = nodeArr[i], b = nodeArr[j];
        let dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
        let dist2 = dx * dx + dy * dy + dz * dz + 1;
        let dist = Math.sqrt(dist2);
        let force = (this.repulsionStrength * this.alpha) / dist2;

        let fx = (dx / dist) * force;
        let fy = (dy / dist) * force;
        let fz = (dz / dist) * force;

        a.vx -= fx; a.vy -= fy; a.vz -= fz;
        b.vx += fx; b.vy += fy; b.vz += fz;
      }
    }

    // Springs
    for (const edge of this.edges) {
      const s = this.nodes.get(edge.source);
      const t = this.nodes.get(edge.target);
      if (!s || !t) continue;

      let dx = t.x - s.x, dy = t.y - s.y, dz = t.z - s.z;
      let dist = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.1;
      let force = (dist - this.springLength) * this.springStrength * (edge.strength || 0.5) * this.alpha;

      let fx = (dx / dist) * force;
      let fy = (dy / dist) * force;
      let fz = (dz / dist) * force;

      s.vx += fx; s.vy += fy; s.vz += fz;
      t.vx -= fx; t.vy -= fy; t.vz -= fz;
    }

    // Category clustering
    const centroids = {};
    for (const node of nodeArr) {
      if (!centroids[node.category]) centroids[node.category] = { x: 0, y: 0, z: 0, count: 0 };
      centroids[node.category].x += node.x;
      centroids[node.category].y += node.y;
      centroids[node.category].z += node.z;
      centroids[node.category].count++;
    }
    for (const cat in centroids) {
      centroids[cat].x /= centroids[cat].count;
      centroids[cat].y /= centroids[cat].count;
      centroids[cat].z /= centroids[cat].count;
    }
    for (const node of nodeArr) {
      const c = centroids[node.category];
      node.vx += (c.x - node.x) * this.categoryClusterStrength * this.alpha;
      node.vy += (c.y - node.y) * this.categoryClusterStrength * this.alpha;
      node.vz += (c.z - node.z) * this.categoryClusterStrength * this.alpha;
    }

    // Center gravity
    for (const node of nodeArr) {
      node.vx -= node.x * this.centerStrength * this.alpha;
      node.vy -= node.y * this.centerStrength * this.alpha;
      node.vz -= node.z * this.centerStrength * this.alpha;
    }

    // Apply velocities
    for (const node of nodeArr) {
      if (node.fx !== null) { node.x = node.fx; node.vx = 0; }
      else { node.vx *= this.velocityDecay; node.x += node.vx; }

      if (node.fy !== null) { node.y = node.fy; node.vy = 0; }
      else { node.vy *= this.velocityDecay; node.y += node.vy; }

      if (node.fz !== null) { node.z = node.fz; node.vz = 0; }
      else { node.vz *= this.velocityDecay; node.z += node.vz; }
    }
  }

  reheat() { this.alpha = 1; }
}

// Create circular gradient texture for nodes
function createCircleTexture(size, color) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const center = size / 2;

  // Outer glow
  const glow = ctx.createRadialGradient(center, center, 0, center, center, center);
  glow.addColorStop(0, `rgba(${color.r*255|0},${color.g*255|0},${color.b*255|0},1)`);
  glow.addColorStop(0.3, `rgba(${color.r*255|0},${color.g*255|0},${color.b*255|0},0.8)`);
  glow.addColorStop(0.6, `rgba(${color.r*255|0},${color.g*255|0},${color.b*255|0},0.2)`);
  glow.addColorStop(1, `rgba(${color.r*255|0},${color.g*255|0},${color.b*255|0},0)`);
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, size, size);

  // Core
  const core = ctx.createRadialGradient(center, center, 0, center, center, center * 0.35);
  core.addColorStop(0, '#ffffff');
  core.addColorStop(1, `rgba(${color.r*255|0},${color.g*255|0},${color.b*255|0},0.9)`);
  ctx.fillStyle = core;
  ctx.beginPath();
  ctx.arc(center, center, center * 0.35, 0, Math.PI * 2);
  ctx.fill();

  return new THREE.CanvasTexture(canvas);
}

// Node meshes
const nodeMeshes = [];

const nodeGeometry = new THREE.PlaneGeometry(1, 1);

for (const node of graph.nodes.values()) {
  const catColor = CATEGORIES[node.category]?.color || new THREE.Color(0.5, 0.5, 0.5);
  const tex = createCircleTexture(128, catColor);
  const mat = new THREE.MeshBasicMaterial({
    map: tex,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const mesh = new THREE.Mesh(nodeGeometry, mat);
  const scale = NODE_BASE_SIZE + node.strength * 8;
  mesh.scale.set(scale, scale, 1);
  mesh.userData = { nodeId: node.id, baseScale: scale };
  nodeGroup.add(mesh);
  nodeMeshes.push(mesh);
  nodeMeshMap.set(node.id, mesh);
}

// ── Node Labels (Canvas Texture Sprites) ────────────────────────────
function createLabelTexture(text, color) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const fontSize = 28;
  ctx.font = `600 ${fontSize}px -apple-system, SF Pro Display, system-ui, sans-serif`;
  const metrics = ctx.measureText(text);
  const w = Math.ceil(metrics.width) + 20;
  const h = fontSize + 16;

  canvas.width = w;
  canvas.height = h;
  ctx.font = `600 ${fontSize}px -apple-system, SF Pro Display, system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color;
  ctx.fillText(text, w / 2, h / 2);

  return { texture: new THREE.CanvasTexture(canvas), width: w / h };
}

  const catColor = CATEGORIES[node.category]?.color || new THREE.Color(0.5, 0.5, 0.5);
  const hex = '#' + catColor.getHexString();
  const { texture, width } = createLabelTexture(node.name, hex);
  const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.75, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  const aspect = width;
  sprite.scale.set(14 * aspect, 14, 1);
  sprite.userData = { nodeId: node.id };
  nodeGroup.add(sprite);
  labelSprites.push(sprite);
}

  const size = 64;

  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.3, 'rgba(255,255,255,0.6)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(canvas);
})();

const particleGeometry = new THREE.BufferGeometry();
particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
particleGeometry.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

// Custom shader for per-particle size and alpha
const particleMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTexture: { value: particleTexture },
    uPixelRatio: { value: renderer.getPixelRatio() },
  },
  vertexShader: `
    attribute float size;
    attribute vec3 color;
    varying vec3 vColor;
    varying float vSize;
    uniform float uPixelRatio;
    void main() {
      vColor = color;
      vSize = size;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * uPixelRatio * (200.0 / -mvPosition.z);
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: `
    uniform sampler2D uTexture;
    varying vec3 vColor;
    void main() {
      vec4 tex = texture2D(uTexture, gl_PointCoord);
      gl_FragColor = vec4(vColor, tex.a * 0.85);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particleSystem);

// ── Background Star Field ───────────────────────────────────────────
const STAR_COUNT = 2000;
const starPositions = new Float32Array(STAR_COUNT * 3);
const starColors = new Float32Array(STAR_COUNT * 3);
for (let i = 0; i < STAR_COUNT; i++) {
  starPositions[i*3]   = (Math.random() - 0.5) * 2000;
  starPositions[i*3+1] = (Math.random() - 0.5) * 2000;
  starPositions[i*3+2] = (Math.random() - 0.5) * 2000;
  const brightness = 0.2 + Math.random() * 0.5;
  const tint = Math.random();
  starColors[i*3]   = brightness * (0.7 + tint * 0.3);
  starColors[i*3+1] = brightness * (0.7 + (1-tint) * 0.3);
  starColors[i*3+2] = brightness;
}
const starGeometry = new THREE.BufferGeometry();
starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
const starMaterial = new THREE.PointsMaterial({
  size: 1.5,
  vertexColors: true,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
scene.add(new THREE.Points(starGeometry, starMaterial));

// ── Ambient Particles (Background atmosphere) ───────────────────────
const AMBIENT_COUNT = 300;
const ambientPositions = new Float32Array(AMBIENT_COUNT * 3);
const ambientVelocities = [];
for (let i = 0; i < AMBIENT_COUNT; i++) {
  ambientPositions[i*3]   = (Math.random() - 0.5) * 500;
  ambientPositions[i*3+1] = (Math.random() - 0.5) * 500;
  ambientPositions[i*3+2] = (Math.random() - 0.5) * 200;
  ambientVelocities.push({
    vx: (Math.random() - 0.5) * 0.2,
    vy: (Math.random() - 0.5) * 0.2,
    vz: (Math.random() - 0.5) * 0.1,
  });
}
const ambientGeometry = new THREE.BufferGeometry();
ambientGeometry.setAttribute('position', new THREE.BufferAttribute(ambientPositions, 3));
const ambientMaterial = new THREE.PointsMaterial({
  size: 2,
  color: 0x4466aa,
  transparent: true,
  opacity: 0.3,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
scene.add(new THREE.Points(ambientGeometry, ambientMaterial));

// ── Interaction (Raycaster) ─────────────────────────────────────────
const raycaster = new THREE.Raycaster();
raycaster.params.Points = { threshold: 5 };
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
let hoveredNode = null;
let draggedNode = null;
let isPointerDown = false;
let pointerMoved = false;

function getNodeAtPointer(clientX, clientY) {
  mouse.x = (clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(clientY / window.innerHeight) * 2 + 1;

  let closestId = null;
  let closestDist = Infinity;

  for (const [id, node] of graph.nodes) {
    const screenPos = new THREE.Vector3(node.x, node.y, node.z).project(camera);
    const sx = (screenPos.x + 1) / 2 * window.innerWidth;
    const sy = -(screenPos.y - 1) / 2 * window.innerHeight;
    const dx = clientX - sx;
    const dy = clientY - sy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 30 && dist < closestDist) {
      closestDist = dist;
      closestId = id;
    }
  }
  return closestId;
}

function showTooltip(nodeId, clientX, clientY) {
  const node = graph.nodes.get(nodeId);
  if (!node) return;
  tooltip.querySelector('.tt-name').textContent = node.name;
  tooltip.querySelector('.tt-type').textContent = `${node.type} / ${node.category}`;
  tooltip.querySelector('.tt-strength').textContent = `Strength: ${(node.strength * 100).toFixed(0)}%`;

  const catColor = CATEGORIES[node.category]?.color;
  if (catColor) {
    tooltip.style.borderColor = `rgba(${catColor.r*255|0},${catColor.g*255|0},${catColor.b*255|0},0.5)`;
  }

  let tx = clientX + 16;
  let ty = clientY - 10;
  if (tx + 280 > window.innerWidth) tx = clientX - 296;
  if (ty + 80 > window.innerHeight) ty = clientY - 80;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
  tooltip.classList.add('visible');
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// ── Event Handlers ──────────────────────────────────────────────────
const canvas = renderer.domElement;

canvas.addEventListener('pointerdown', (e) => {
  isPointerDown = true;
  pointerMoved = false;
  orbitState.lastX = e.clientX;
  orbitState.lastY = e.clientY;

  const nodeId = getNodeAtPointer(e.clientX, e.clientY);
  if (nodeId) {
    draggedNode = nodeId;
    const node = graph.nodes.get(nodeId);
    node.fx = node.x;
    node.fy = node.y;
    node.fz = node.z;
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('pointermove', (e) => {
  pointerMoved = true;

  if (draggedNode && isPointerDown) {
    // Project pointer to 3D plane at node's depth
    const node = graph.nodes.get(draggedNode);
    const projected = new THREE.Vector3(node.x, node.y, node.z).project(camera);

    // Move in screen space, re-project to world
    const ndcX = (e.clientX / window.innerWidth) * 2 - 1;
    const ndcY = -(e.clientY / window.innerHeight) * 2 + 1;

    const dir = new THREE.Vector3(ndcX, ndcY, 0.5).unproject(camera).sub(camera.position).normalize();
    const dist = camera.position.distanceTo(new THREE.Vector3(node.x, node.y, node.z));
    const newPos = camera.position.clone().add(dir.multiplyScalar(dist));

    node.fx = newPos.x;
    node.fy = newPos.y;
    node.fz = newPos.z;
    node.x = newPos.x;
    node.y = newPos.y;
    node.z = newPos.z;
    graph.reheat();
    return;
  }

  if (isPointerDown && !draggedNode) {
    const dx = e.clientX - orbitState.lastX;
    const dy = e.clientY - orbitState.lastY;
    orbitState.targetTheta -= dx * 0.005;
    orbitState.targetPhi += dy * 0.005;
    orbitState.lastX = e.clientX;
    orbitState.lastY = e.clientY;
    return;
  }

  // Hover detection
  const nodeId = getNodeAtPointer(e.clientX, e.clientY);
  if (nodeId !== hoveredNode) {
    hoveredNode = nodeId;
    if (nodeId) {
      showTooltip(nodeId, e.clientX, e.clientY);
      canvas.style.cursor = 'grab';
    } else {
      hideTooltip();
      canvas.style.cursor = 'default';
    }
  } else if (nodeId) {
    showTooltip(nodeId, e.clientX, e.clientY);
  }
});

canvas.addEventListener('pointerup', () => {
  if (draggedNode) {
    const node = graph.nodes.get(draggedNode);
    node.fx = null;
    node.fy = null;
    node.fz = null;
  }
  isPointerDown = false;
  draggedNode = null;
  canvas.style.cursor = hoveredNode ? 'grab' : 'default';
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  orbitState.targetRadius += e.deltaY * 0.5;
  orbitState.targetRadius = Math.max(100, Math.min(1000, orbitState.targetRadius));
}, { passive: false });

// Touch support
let touchStartDist = 0;
let touchStartRadius = 0;

canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchStartDist = Math.sqrt(dx * dx + dy * dy);
    touchStartRadius = orbitState.targetRadius;
  } else if (e.touches.length === 1) {
    const nodeId = getNodeAtPointer(e.touches[0].clientX, e.touches[0].clientY);
    if (nodeId) {
      draggedNode = nodeId;
      const node = graph.nodes.get(nodeId);
      node.fx = node.x;
      node.fy = node.y;
      node.fz = node.z;
    }
    orbitState.lastX = e.touches[0].clientX;
    orbitState.lastY = e.touches[0].clientY;
  }
}, { passive: true });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    orbitState.targetRadius = touchStartRadius * (touchStartDist / dist);
    orbitState.targetRadius = Math.max(100, Math.min(1000, orbitState.targetRadius));
  } else if (e.touches.length === 1) {
    if (draggedNode) {
      const node = graph.nodes.get(draggedNode);
      const ndcX = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
      const ndcY = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
      const dir = new THREE.Vector3(ndcX, ndcY, 0.5).unproject(camera).sub(camera.position).normalize();
      const dist = camera.position.distanceTo(new THREE.Vector3(node.x, node.y, node.z));
      const newPos = camera.position.clone().add(dir.multiplyScalar(dist));
      node.fx = newPos.x; node.fy = newPos.y; node.fz = newPos.z;
      node.x = newPos.x; node.y = newPos.y; node.z = newPos.z;
      graph.reheat();
    } else {
      const dx = e.touches[0].clientX - orbitState.lastX;
      const dy = e.touches[0].clientY - orbitState.lastY;
      orbitState.targetTheta -= dx * 0.005;
      orbitState.targetPhi += dy * 0.005;
      orbitState.lastX = e.touches[0].clientX;
      orbitState.lastY = e.touches[0].clientY;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', () => {
  if (draggedNode) {
    const node = graph.nodes.get(draggedNode);
    node.fx = null; node.fy = null; node.fz = null;
  }
  draggedNode = null;
});

// ── Legend ───────────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
for (const [key, cat] of Object.entries(CATEGORIES)) {
  const hex = '#' + cat.color.getHexString();
  legendEl.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${hex}"></div>${cat.label}</div>`;
}

// ── Animation Loop ──────────────────────────────────────────────────
let frameCount = 0;
let lastFpsTime = performance.now();
let fps = 60;
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();
  const delta = clock.getDelta();

  // FPS counter
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime > 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('s-fps').textContent = fps;
  }

  // Auto-rotate when not interacting
  if (!isPointerDown && !draggedNode) {
    orbitState.targetTheta += orbitState.autoRotateSpeed;
  }

  updateCameraFromOrbit();

  // Run force simulation
  graph.tick();

  // Update node meshes
  for (const mesh of nodeMeshes) {
    const node = graph.nodes.get(mesh.userData.nodeId);
    if (!node) continue;
    mesh.position.set(node.x, node.y, node.z);

    // Pulse effect for hovered node
    const pulse = hoveredNode === node.id ? 1 + Math.sin(time * 4) * 0.15 : 1;
    const s = mesh.userData.baseScale * pulse;
    mesh.scale.set(s, s, 1);
  }

  // Update label sprites
  for (const sprite of labelSprites) {
    const node = graph.nodes.get(sprite.userData.nodeId);
    if (!node) continue;
    sprite.position.set(node.x, node.y - 12, node.z);
    // Fade based on distance to camera
    const dist = camera.position.distanceTo(sprite.position);
    sprite.material.opacity = Math.max(0, Math.min(0.85, 1 - dist / 600));
  }

  // Update edge lines
  let edgeIdx = 0;
  for (const edge of edgesData) {
    const s = graph.nodes.get(edge.source);
    const t = graph.nodes.get(edge.target);
    if (!s || !t) continue;

    const i = edgeIdx * 6;
    edgePositions[i]   = s.x; edgePositions[i+1] = s.y; edgePositions[i+2] = s.z;
    edgePositions[i+3] = t.x; edgePositions[i+4] = t.y; edgePositions[i+5] = t.z;

    const sColor = CATEGORIES[s.category]?.color || new THREE.Color(0.5,0.5,0.5);
    const tColor = CATEGORIES[t.category]?.color || new THREE.Color(0.5,0.5,0.5);
    const alpha = 0.15 + edge.strength * 0.3;
    edgeColors[i]   = sColor.r * alpha; edgeColors[i+1] = sColor.g * alpha; edgeColors[i+2] = sColor.b * alpha;
    edgeColors[i+3] = tColor.r * alpha; edgeColors[i+4] = tColor.g * alpha; edgeColors[i+5] = tColor.b * alpha;

    edgeIdx++;
  }
  edgeGeometry.attributes.position.needsUpdate = true;
  edgeGeometry.attributes.color.needsUpdate = true;

  // Update flowing particles
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = particles[i];
    const edge = edgesData[p.edgeIdx];
    const s = graph.nodes.get(edge.source);
    const t = graph.nodes.get(edge.target);
    if (!s || !t) continue;

    p.t += p.speed;
    if (p.t > 1) {
      p.t -= 1;
      p.edgeIdx = Math.floor(Math.random() * edgesData.length);
    }

    // Ease t for smoother flow
    const et = p.t * p.t * (3 - 2 * p.t);
    particlePositions[i*3]   = s.x + (t.x - s.x) * et;
    particlePositions[i*3+1] = s.y + (t.y - s.y) * et;
    particlePositions[i*3+2] = s.z + (t.z - s.z) * et;

    const sColor = CATEGORIES[s.category]?.color || new THREE.Color(0.5,0.5,0.5);
    const tColor = CATEGORIES[t.category]?.color || new THREE.Color(0.5,0.5,0.5);
    const fadeIn = Math.min(p.t * 5, 1);
    const fadeOut = Math.min((1 - p.t) * 5, 1);
    const fade = fadeIn * fadeOut;

    particleColors[i*3]   = (sColor.r + (tColor.r - sColor.r) * et) * fade;
    particleColors[i*3+1] = (sColor.g + (tColor.g - sColor.g) * et) * fade;
    particleColors[i*3+2] = (sColor.b + (tColor.b - sColor.b) * et) * fade;

    particleSizes[i] = p.size * fade;
  }
  particleGeometry.attributes.position.needsUpdate = true;
  particleGeometry.attributes.color.needsUpdate = true;
  particleGeometry.attributes.size.needsUpdate = true;

  // Update ambient particles
  for (let i = 0; i < AMBIENT_COUNT; i++) {
    const v = ambientVelocities[i];
    ambientPositions[i*3]   += v.vx;
    ambientPositions[i*3+1] += v.vy;
    ambientPositions[i*3+2] += v.vz;
    // Wrap around
    if (Math.abs(ambientPositions[i*3])   > 250) v.vx *= -1;
    if (Math.abs(ambientPositions[i*3+1]) > 250) v.vy *= -1;
    if (Math.abs(ambientPositions[i*3+2]) > 100) v.vz *= -1;
  }
  ambientGeometry.attributes.position.needsUpdate = true;

  // Subtle bloom pulse
  bloomPass.strength = 0.7 + Math.sin(time * 0.5) * 0.15;

  composer.render();
}

// ── Stats ───────────────────────────────────────────────────────────
document.getElementById('s-nodes').textContent = nodesData.length;
document.getElementById('s-edges').textContent = edgesData.length;
document.getElementById('s-particles').textContent = PARTICLE_COUNT;

// ── Resize ──────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloomPass.resolution.set(w, h);
});

// ── Start ───────────────────────────────────────────────────────────
animate();

</script>
</body>
</html>
