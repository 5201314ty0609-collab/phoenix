<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHOENIX AIOS · 登录</title>
<style>
/* 设计令牌 */
:root {
  /* OKLCH 颜色 */
  --primary-500: oklch(0.65 0.2 250);
  --primary-400: oklch(0.7 0.18 250);
  --primary-300: oklch(0.75 0.15 250);
  --accent-500: oklch(0.75 0.15 195);
  --accent-400: oklch(0.8 0.12 195);

  /* 表面色 */
  --surface-bg: oklch(0.15 0.02 250);
  --surface-card: oklch(0.18 0.02 250);
  --surface-input: oklch(0.2 0.02 250);

  /* 文字色 */
  --text-primary: oklch(0.95 0.01 250);
  --text-secondary: oklch(0.7 0.02 250);
  --text-muted: oklch(0.5 0.02 250);

  /* 边框 */
  --border-default: oklch(0.25 0.02 250);
  --border-focus: oklch(0.65 0.2 250);

  /* 间距 (4px 网格) */
  --space-1: 0.25rem;  /* 4px */
  --space-2: 0.5rem;   /* 8px */
  --space-3: 0.75rem;  /* 12px */
  --space-4: 1rem;     /* 16px */
  --space-5: 1.25rem;  /* 20px */
  --space-6: 1.5rem;   /* 24px */
  --space-8: 2rem;     /* 32px */
  --space-10: 2.5rem;  /* 40px */
  --space-12: 3rem;    /* 48px */

  /* 字体 */
  --font-sans: 'Geist', 'SF Pro', system-ui, sans-serif;
  --font-mono: 'Geist Mono', 'SF Mono', monospace;

  /* 字号 */
  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;

  /* 圆角 */
  --radius-sm: 0.25rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;

  /* 阴影 */
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.1);
  --shadow-md: 0 4px 6px oklch(0 0 0 / 0.15);
  --shadow-lg: 0 10px 15px oklch(0 0 0 / 0.2);
  --shadow-glow: 0 0 20px oklch(0.65 0.2 250 / 0.3);

  /* 动画 */
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --duration-slow: 350ms;
  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-enter: cubic-bezier(0, 0, 0.2, 1);
  --ease-exit: cubic-bezier(0.4, 0, 1, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--surface-bg);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-4);
}

/* 登录容器 */
.login-container {
  width: 100%;
  max-width: 400px;
  animation: fadeInUp var(--duration-slow) var(--ease-enter);
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Logo 区域 */
.login-header {
  text-align: center;
  margin-bottom: var(--space-8);
}

.login-logo {
  width: 64px;
  height: 64px;
  background: var(--gradient-primary, linear-gradient(135deg, var(--primary-500), var(--accent-500)));
  border-radius: var(--radius-xl);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto var(--space-4);
  font-size: var(--text-2xl);
  box-shadow: var(--shadow-glow);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: var(--shadow-glow); }
  50% { box-shadow: 0 0 30px oklch(0.65 0.2 250 / 0.5); }
}

.login-title {
  font-size: var(--text-3xl);
  font-weight: 700;
  margin-bottom: var(--space-2);
  background: linear-gradient(135deg, var(--primary-400), var(--accent-400));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.login-subtitle {
  font-size: var(--text-sm);
  color: var(--text-muted);
}

/* 登录卡片 */
.login-card {
  background: var(--surface-card);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-xl);
  padding: var(--space-8);
  box-shadow: var(--shadow-lg);
  transition: border-color var(--duration-normal) var(--ease-standard);
}

.login-card:hover {
  border-color: var(--primary-500);
}

/* 表单 */
.form-group {
  margin-bottom: var(--space-5);
}

.form-label {
  display: block;
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: var(--space-2);
}

.form-input {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  background: var(--surface-input);
  border: 2px solid var(--border-default);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: var(--text-base);
  transition: all var(--duration-fast) var(--ease-standard);
  outline: none;
}

.form-input::placeholder {
  color: var(--text-muted);
}

.form-input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px oklch(0.65 0.2 250 / 0.2);
}

.form-input:hover:not(:focus) {
  border-color: oklch(0.35 0.02 250);
}

/* 按钮 */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-md);
  font-family: var(--font-sans);
  font-size: var(--text-base);
  font-weight: 600;
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-standard);
  border: none;
  outline: none;
}

.btn-primary {
  width: 100%;
  background: var(--primary-500);
  color: white;
  box-shadow: var(--shadow-md);
}

.btn-primary:hover {
  background: var(--primary-400);
  box-shadow: var(--shadow-lg), var(--shadow-glow);
  transform: translateY(-1px);
}

.btn-primary:active {
  transform: translateY(0);
  box-shadow: var(--shadow-sm);
}

.btn-primary:focus-visible {
  box-shadow: 0 0 0 3px oklch(0.65 0.2 250 / 0.4);
}

/* 加载状态 */
.btn-loading {
  position: relative;
  color: transparent;
}

.btn-loading::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  border: 2px solid oklch(1 0 0 / 0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* 链接 */
.login-footer {
  margin-top: var(--space-6);
  text-align: center;
  font-size: var(--text-sm);
  color: var(--text-muted);
}

.login-link {
  color: var(--primary-400);
  text-decoration: none;
  transition: color var(--duration-fast);
}

.login-link:hover {
  color: var(--primary-300);
  text-decoration: underline;
}

/* 分隔线 */
.divider {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  margin: var(--space-6) 0;
  color: var(--text-muted);
  font-size: var(--text-sm);
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-default);
}

/* 社交登录 */
.social-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-3);
}

.btn-social {
  background: var(--surface-input);
  border: 1px solid var(--border-default);
  color: var(--text-primary);
  padding: var(--space-3);
}

.btn-social:hover {
  background: var(--surface-card);
  border-color: var(--primary-500);
}

/* 记住我 */
.remember-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-5);
}

.checkbox-label {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-sm);
  color: var(--text-secondary);
  cursor: pointer;
}

.checkbox {
  width: 16px;
  height: 16px;
  accent-color: var(--primary-500);
}

/* 响应式 */
@media (max-width: 480px) {
  .login-card {
    padding: var(--space-6);
  }

  .login-title {
    font-size: var(--text-2xl);
  }

  .social-buttons {
    grid-template-columns: 1fr;
  }
}

/* 减少动画 */
@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<div class="login-container">
  <!-- Logo -->
  <div class="login-header">
    <div class="login-logo">🔥</div>
    <h1 class="login-title">PHOENIX AIOS</h1>
    <p class="login-subtitle">自进化智能体操作系统</p>
  </div>

  <!-- 登录卡片 -->
  <div class="login-card">
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">邮箱</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="your@email.com"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        >
      </div>

      <div class="remember-row">
        <label class="checkbox-label">
          <input type="checkbox" class="checkbox">
          <span>记住我</span>
        </label>
        <a href="#" class="login-link">忘记密码？</a>
      </div>

      <button type="submit" class="btn btn-primary" id="loginBtn">
        登录
      </button>
    </form>

    <div class="divider">或</div>

    <div class="social-buttons">
      <button class="btn btn-social">
        🔑 GitHub
      </button>
      <button class="btn btn-social">
        🤖 Google
      </button>
    </div>
  </div>

  <div class="login-footer">
    还没有账号？<a href="#" class="login-link">注册</a>
  </div>
</div>

<script>
// 主题切换
const theme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', theme);

// 表单提交
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const btn = document.getElementById('loginBtn');
  btn.classList.add('btn-loading');
  btn.disabled = true;

  // 模拟登录
  await new Promise(resolve => setTimeout(resolve, 1500));

  btn.classList.remove('btn-loading');
  btn.disabled = false;

  alert('登录成功！');
});
</script>

</body>
</html>
