<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHOENIX AIOS · 数据表格</title>
<style>
/* 设计令牌 */
:root {
  --primary-500: oklch(0.65 0.2 250);
  --accent-500: oklch(0.75 0.15 195);
  --surface-bg: oklch(0.15 0.02 250);
  --surface-card: oklch(0.18 0.02 250);
  --surface-hover: oklch(0.2 0.02 250);
  --text-primary: oklch(0.95 0.01 250);
  --text-secondary: oklch(0.7 0.02 250);
  --text-muted: oklch(0.5 0.02 250);
  --border-default: oklch(0.25 0.02 250);
  --success: oklch(0.7 0.2 145);
  --warning: oklch(0.75 0.15 85);
  --error: oklch(0.65 0.2 25);
  --font-sans: 'Geist', 'SF Pro', system-ui, sans-serif;
  --font-mono: 'Geist Mono', 'SF Mono', monospace;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.1);
  --shadow-md: 0 4px 6px oklch(0 0 0 / 0.15);
  --duration-fast: 150ms;
  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-sans);
  background: var(--surface-bg);
  color: var(--text-primary);
  padding: 2rem;
}

/* 表格容器 */
.table-container {
  background: var(--surface-card);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-md);
}

/* 表格工具栏 */
.table-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border-default);
  gap: 1rem;
  flex-wrap: wrap;
}

.table-title {
  font-size: 1.25rem;
  font-weight: 600;
}

.table-actions {
  display: flex;
  gap: 0.75rem;
  align-items: center;
}

.search-input {
  padding: 0.5rem 1rem;
  background: var(--surface-bg);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-size: 0.875rem;
  outline: none;
  transition: border-color var(--duration-fast);
  min-width: 200px;
}

.search-input:focus {
  border-color: var(--primary-500);
}

.btn {
  padding: 0.5rem 1rem;
  border-radius: var(--radius-md);
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-standard);
  border: 1px solid var(--border-default);
  background: var(--surface-bg);
  color: var(--text-primary);
}

.btn:hover {
  background: var(--surface-hover);
  border-color: var(--primary-500);
}

.btn-primary {
  background: var(--primary-500);
  border-color: var(--primary-500);
  color: white;
}

.btn-primary:hover {
  opacity: 0.9;
}

/* 表格 */
.table {
  width: 100%;
  border-collapse: collapse;
}

.table th {
  padding: 0.75rem 1.5rem;
  text-align: left;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  background: var(--surface-bg);
  border-bottom: 1px solid var(--border-default);
  position: sticky;
  top: 0;
  user-select: none;
}

.table th.sortable {
  cursor: pointer;
}

.table th.sortable:hover {
  color: var(--text-primary);
}

.table th .sort-icon {
  margin-left: 0.25rem;
  opacity: 0.5;
}

.table th.sorted .sort-icon {
  opacity: 1;
  color: var(--primary-500);
}

.table td {
  padding: 1rem 1.5rem;
  font-size: 0.875rem;
  border-bottom: 1px solid var(--border-default);
  transition: background var(--duration-fast);
}

.table tr:hover td {
  background: var(--surface-hover);
}

.table tr:last-child td {
  border-bottom: none;
}

/* 单元格样式 */
.cell-name {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.cell-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--primary-500);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 600;
  color: white;
  flex-shrink: 0;
}

.cell-info {
  display: flex;
  flex-direction: column;
}

.cell-primary {
  font-weight: 500;
}

.cell-secondary {
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* 状态徽章 */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.375rem;
  padding: 0.25rem 0.75rem;
  border-radius: 9999px;
  font-size: 0.75rem;
  font-weight: 500;
}

.badge-success {
  background: oklch(0.7 0.2 145 / 0.15);
  color: var(--success);
}

.badge-warning {
  background: oklch(0.75 0.15 85 / 0.15);
  color: var(--warning);
}

.badge-error {
  background: oklch(0.65 0.2 25 / 0.15);
  color: var(--error);
}

.badge-info {
  background: oklch(0.65 0.2 250 / 0.15);
  color: var(--primary-500);
}

.badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* 进度条 */
.progress-bar {
  width: 100px;
  height: 6px;
  background: var(--surface-bg);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s ease;
}

.progress-fill.high { background: var(--success); }
.progress-fill.medium { background: var(--warning); }
.progress-fill.low { background: var(--error); }

/* 操作按钮 */
.actions-cell {
  display: flex;
  gap: 0.5rem;
}

.btn-icon {
  width: 32px;
  height: 32px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  font-size: 1rem;
}

/* 分页 */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  border-top: 1px solid var(--border-default);
  font-size: 0.875rem;
  color: var(--text-muted);
}

.pagination-info {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.pagination-buttons {
  display: flex;
  gap: 0.25rem;
}

.pagination-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-default);
  background: transparent;
  color: var(--text-primary);
  cursor: pointer;
  transition: all var(--duration-fast);
}

.pagination-btn:hover {
  background: var(--surface-hover);
  border-color: var(--primary-500);
}

.pagination-btn.active {
  background: var(--primary-500);
  border-color: var(--primary-500);
  color: white;
}

.pagination-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* 响应式 */
@media (max-width: 768px) {
  .table-toolbar {
    flex-direction: column;
    align-items: stretch;
  }

  .search-input {
    min-width: auto;
  }

  .table td, .table th {
    padding: 0.75rem;
  }

  .pagination {
    flex-direction: column;
    gap: 1rem;
  }
}
</style>
</head>
<body>

<div class="table-container">
  <!-- 工具栏 -->
  <div class="table-toolbar">
    <h2 class="table-title">Agent 列表</h2>
    <div class="table-actions">
      <input type="text" class="search-input" placeholder="搜索 Agent..." id="searchInput">
      <button class="btn">筛选</button>
      <button class="btn btn-primary">+ 新建 Agent</button>
    </div>
  </div>

  <!-- 表格 -->
  <table class="table">
    <thead>
      <tr>
        <th class="sortable" data-sort="name">
          名称 <span class="sort-icon">↕</span>
        </th>
        <th class="sortable" data-sort="status">
          状态 <span class="sort-icon">↕</span>
        </th>
        <th class="sortable" data-sort="type">
          类型 <span class="sort-icon">↕</span>
        </th>
        <th class="sortable" data-sort="health">
          健康度 <span class="sort-icon">↕</span>
        </th>
        <th class="sortable" data-sort="tasks">
          任务数 <span class="sort-icon">↕</span>
        </th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <!-- 动态生成 -->
    </tbody>
  </table>

  <!-- 分页 -->
  <div class="pagination">
    <div class="pagination-info">
      显示 <strong>1-10</strong> 共 <strong>25</strong> 条
    </div>
    <div class="pagination-buttons">
      <button class="pagination-btn" disabled>‹</button>
      <button class="pagination-btn active">1</button>
      <button class="pagination-btn">2</button>
      <button class="pagination-btn">3</button>
      <button class="pagination-btn">›</button>
    </div>
  </div>
</div>

<script>
// 示例数据
const agents = [
  { name: 'CTM Core', avatar: '🧠', status: 'running', type: '核心引擎', health: 98, tasks: 156 },
  { name: 'Thinking Stream', avatar: '💭', status: 'running', type: '思维引擎', health: 95, tasks: 89 },
  { name: 'Adaptive Compute', avatar: '⚡', status: 'running', type: '计算引擎', health: 92, tasks: 234 },
  { name: 'Oscillator Sync', avatar: '🔄', status: 'running', type: '同步引擎', health: 88, tasks: 67 },
  { name: 'Event Bus', avatar: '📡', status: 'running', type: '事件系统', health: 100, tasks: 1024 },
  { name: 'Memory Manager', avatar: '💾', status: 'running', type: '记忆系统', health: 96, tasks: 445 },
  { name: 'Rule Engine', avatar: '📜', status: 'running', type: '规则系统', health: 94, tasks: 312 },
  { name: 'Skill Pipeline', avatar: '🔧', status: 'warning', type: '技能系统', health: 78, tasks: 189 },
  { name: 'Security Guard', avatar: '🛡️', status: 'running', type: '安全系统', health: 100, tasks: 567 },
  { name: 'Dashboard', avatar: '📊', status: 'running', type: '可视化', health: 99, tasks: 234 },
];

// 状态映射
const statusMap = {
  running: { label: '运行中', class: 'success' },
  warning: { label: '警告', class: 'warning' },
  error: { label: '错误', class: 'error' },
  stopped: { label: '已停止', class: 'info' },
};

// 渲染表格
function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = data.map(agent => `
    <tr>
      <td>
        <div class="cell-name">
          <div class="cell-avatar">${agent.avatar}</div>
          <div class="cell-info">
            <div class="cell-primary">${agent.name}</div>
            <div class="cell-secondary">${agent.type}</div>
          </div>
        </div>
      </td>
      <td>
        <span class="badge badge-${statusMap[agent.status].class}">
          <span class="badge-dot"></span>
          ${statusMap[agent.status].label}
        </span>
      </td>
      <td>${agent.type}</td>
      <td>
        <div class="progress-bar">
          <div class="progress-fill ${agent.health >= 90 ? 'high' : agent.health >= 70 ? 'medium' : 'low'}"
               style="width: ${agent.health}%"></div>
        </div>
        <span style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; display: block;">
          ${agent.health}%
        </span>
      </td>
      <td>${agent.tasks}</td>
      <td>
        <div class="actions-cell">
          <button class="btn btn-icon" title="查看详情">👁️</button>
          <button class="btn btn-icon" title="编辑">✏️</button>
          <button class="btn btn-icon" title="更多">⋯</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// 初始化
renderTable(agents);

// 搜索功能
document.getElementById('searchInput').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  const filtered = agents.filter(a =>
    a.name.toLowerCase().includes(query) ||
    a.type.toLowerCase().includes(query)
  );
  renderTable(filtered);
});
</script>

</body>
</html>
