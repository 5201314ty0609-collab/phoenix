<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHOENIX Skill Network - 3D Force Graph</title>
  <style>
    :root {
      --color-bg: oklch(12% 0.02 260);
      --color-surface: oklch(18% 0.02 260);
      --color-text: oklch(90% 0.01 260);
      --color-text-muted: oklch(60% 0.02 260);
      --color-accent: oklch(70% 0.15 200);
      --color-accent-glow: oklch(70% 0.15 200 / 0.3);
      --color-node-core: oklch(65% 0.18 200);
      --color-node-tool: oklch(70% 0.15 150);
      --color-node-framework: oklch(75% 0.12 280);
      --color-node-skill: oklch(68% 0.16 30);
      --color-edge: oklch(50% 0.08 260 / 0.4);
      --color-particle: oklch(80% 0.12 200);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Geist', 'Inter', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    canvas {
      display: block;
    }

    /* HUD Overlay */
    .hud {
      position: fixed;
      z-index: 10;
      pointer-events: none;
    }

    .hud-header {
      top: 0;
      left: 0;
      right: 0;
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .hud-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .hud-title span {
      color: var(--color-accent);
      font-weight: 600;
    }

    .hud-stats {
      display: flex;
      gap: 24px;
      font-size: 12px;
      color: var(--color-text-muted);
      font-variant-numeric: tabular-nums;
    }

    .hud-stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hud-stat-value {
      color: var(--color-text);
      font-weight: 600;
    }

    .hud-footer {
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .hud-legend {
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: var(--color-text-muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .hud-controls {
      font-size: 11px;
      color: var(--color-text-muted);
      text-align: right;
      line-height: 1.8;
    }

    .hud-controls kbd {
      display: inline-block;
      padding: 2px 6px;
      background: var(--color-surface);
      border: 1px solid oklch(30% 0.02 260);
      border-radius: 4px;
      font-family: inherit;
      font-size: 10px;
      margin: 0 2px;
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 150ms ease, transform 150ms ease;
      background: var(--color-surface);
      border: 1px solid oklch(30% 0.02 260);
      border-radius: 8px;
      padding: 12px 16px;
      min-width: 180px;
      backdrop-filter: blur(12px);
    }

    .tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tooltip-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .tooltip-category {
      font-size: 11px;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .tooltip-stats {
      display: flex;
      gap: 12px;
      font-size: 12px;
    }

    .tooltip-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .tooltip-stat-label {
      font-size: 10px;
      color: var(--color-text-muted);
      text-transform: uppercase;
    }

    .tooltip-stat-value {
      font-weight: 600;
      color: var(--color-accent);
    }

    /* Search Panel */
    .search-panel {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      pointer-events: auto;
    }

    .search-input {
      width: 280px;
      padding: 10px 16px;
      background: oklch(18% 0.02 260 / 0.8);
      border: 1px solid oklch(30% 0.02 260);
      border-radius: 8px;
      color: var(--color-text);
      font-size: 13px;
      font-family: inherit;
      backdrop-filter: blur(12px);
      outline: none;
      transition: border-color 200ms ease;
    }

    .search-input::placeholder {
      color: var(--color-text-muted);
    }

    .search-input:focus {
      border-color: var(--color-accent);
    }

    /* Category filter */
    .category-filter {
      position: fixed;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 15;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: auto;
    }

    .category-btn {
      padding: 8px 12px;
      background: oklch(18% 0.02 260 / 0.6);
      border: 1px solid oklch(25% 0.02 260);
      border-radius: 6px;
      color: var(--color-text-muted);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: all 200ms ease;
      text-align: left;
      backdrop-filter: blur(8px);
    }

    .category-btn:hover {
      background: oklch(22% 0.04 260);
      color: var(--color-text);
    }

    .category-btn.active {
      background: oklch(25% 0.06 200 / 0.3);
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    /* Loading */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 500ms ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid oklch(30% 0.02 260);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 800ms linear infinite;
    }

    .loading-text {
      margin-top: 16px;
      font-size: 12px;
      color: var(--color-text-muted);
      letter-spacing: 0.06em;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

    // ─── Force-directed layout ──────────────────────────────────────────────
    class ForceGraph {
      constructor(nodes, edges) {
        this.nodes = nodes.map(n => ({
          ...n,
          x: (Math.random() - 0.5) * 40,
          y: (Math.random() - 0.5) * 40,
          z: (Math.random() - 0.5) * 40,
          vx: 0, vy: 0, vz: 0,
        }));
        this.edges = edges;
        this.nodeMap = new Map(this.nodes.map(n => [n.id, n]));

        // Build adjacency
        this.adjacency = new Map();
        this.nodes.forEach(n => this.adjacency.set(n.id, []));
        edges.forEach(e => {
          this.adjacency.get(e.source)?.push(e.target);
          this.adjacency.get(e.target)?.push(e.source);
        });
      }

      tick(alpha) {
        const damping = 0.85;
        const repulsion = 800;
        const attraction = 0.015;
        const centerGravity = 0.005;
        const idealLength = 8;

        // Repulsion (all pairs)
        for (let i = 0; i < this.nodes.length; i++) {
          for (let j = i + 1; j < this.nodes.length; j++) {
            const a = this.nodes[i];
            const b = this.nodes[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dz = b.z - a.z;
            const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.01;
            const force = repulsion / (dist * dist);
            const fx = (dx / dist) * force * alpha;
            const fy = (dy / dist) * force * alpha;
            const fz = (dz / dist) * force * alpha;
            a.vx -= fx; a.vy -= fy; a.vz -= fz;
            b.vx += fx; b.vy += fy; b.vz += fz;
          }
        }

        // Attraction (edges)
        this.edges.forEach(e => {
          const a = this.nodeMap.get(e.source);
          const b = this.nodeMap.get(e.target);
          if (!a || !b) return;
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dz = b.z - a.z;
          const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.01;
          const force = (dist - idealLength) * attraction * e.strength * alpha;
          const fx = (dx / dist) * force;
          const fy = (dy / dist) * force;
          const fz = (dz / dist) * force;
          a.vx += fx; a.vy += fy; a.vz += fz;
          b.vx -= fx; b.vy -= fy; b.vz -= fz;
        });

        // Center gravity
        this.nodes.forEach(n => {
          n.vx -= n.x * centerGravity * alpha;
          n.vy -= n.y * centerGravity * alpha;
          n.vz -= n.z * centerGravity * alpha;
        });

        // Apply velocity
        this.nodes.forEach(n => {
          if (n._fixed) return;
          n.vx *= damping;
          n.vy *= damping;
          n.vz *= damping;
          n.x += n.vx;
          n.y += n.vy;
          n.z += n.vz;
        });
      }
    }

    // ─── Particle System ────────────────────────────────────────────────────
    class ParticleFlow {
      constructor(scene, maxParticles = 2000) {
        this.scene = scene;
        this.maxParticles = maxParticles;
        this.particles = [];
        this.geometry = new THREE.BufferGeometry();
        this.positions = new Float32Array(maxParticles * 3);
        this.colors = new Float32Array(maxParticles * 3);
        this.sizes = new Float32Array(maxParticles);
        this.alphas = new Float32Array(maxParticles);

        this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
        this.geometry.setAttribute('color', new THREE.BufferAttribute(this.colors, 3));
        this.geometry.setAttribute('size', new THREE.BufferAttribute(this.sizes, 1));
        this.geometry.setAttribute('alpha', new THREE.BufferAttribute(this.alphas, 1));

        // Shader material for particles
        const vertexShader = `
          attribute float size;
          attribute float alpha;
          varying vec3 vColor;
          varying float vAlpha;
          void main() {
            vColor = color;
            vAlpha = alpha;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = size * (200.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
          }
        `;
        const fragmentShader = `
          varying vec3 vColor;
          varying float vAlpha;
          void main() {
            float d = length(gl_PointCoord - vec2(0.5));
            if (d > 0.5) discard;
            float a = smoothstep(0.5, 0.2, d) * vAlpha;
            gl_FragColor = vec4(vColor, a);
          }
        `;

        this.material = new THREE.ShaderMaterial({
          vertexShader,
          fragmentShader,
          vertexColors: true,
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        });

        this.mesh = new THREE.Points(this.geometry, this.material);
        this.mesh.frustumCulled = false;
        scene.add(this.mesh);
      }

      emit(sourcePos, targetPos, color, strength) {
        if (this.particles.length >= this.maxParticles) return;

        const particle = {
          sx: sourcePos.x, sy: sourcePos.y, sz: sourcePos.z,
          tx: targetPos.x, ty: targetPos.y, tz: targetPos.z,
          progress: Math.random(),
          speed: 0.002 + strength * 0.003,
          size: 1.5 + strength * 2,
          r: color.r, g: color.g, b: color.b,
          life: 1.0,
        };
        this.particles.push(particle);
      }

      update(dt) {
        const toRemove = [];

        for (let i = 0; i < this.particles.length; i++) {
          const p = this.particles[i];
          p.progress += p.speed;
          if (p.progress >= 1.0) {
            p.progress = 0;
            p.life -= 0.1;
            if (p.life <= 0) {
              toRemove.push(i);
              continue;
            }
          }

          const t = p.progress;
          const idx = i * 3;
          this.positions[idx] = p.sx + (p.tx - p.sx) * t;
          this.positions[idx + 1] = p.sy + (p.ty - p.sy) * t;
          this.positions[idx + 2] = p.sz + (p.tz - p.sz) * t;
          this.colors[idx] = p.r;
          this.colors[idx + 1] = p.g;
          this.colors[idx + 2] = p.b;
          this.sizes[i] = p.size * (1 - Math.abs(t - 0.5) * 2);
          this.alphas[i] = p.life * (1 - Math.abs(t - 0.5) * 2);
        }

        // Remove dead particles
        for (let i = toRemove.length - 1; i >= 0; i--) {
          this.particles.splice(toRemove[i], 1);
        }

        // Zero out unused
        for (let i = this.particles.length; i < this.maxParticles; i++) {
          this.sizes[i] = 0;
          this.alphas[i] = 0;
        }

        this.geometry.attributes.position.needsUpdate = true;
        this.geometry.attributes.color.needsUpdate = true;
        this.geometry.attributes.size.needsUpdate = true;
        this.geometry.attributes.alpha.needsUpdate = true;
      }
    }

    // ─── Edge Renderer ──────────────────────────────────────────────────────
    class EdgeRenderer {
      constructor(scene, maxEdges = 200) {
        this.scene = scene;
        this.edgeMeshes = [];

        // We'll use instanced lines for performance
        // For simplicity, using LineSegments
        this.geometry = new THREE.BufferGeometry();
        this.positions = new Float32Array(maxEdges * 6); // 2 vertices per edge, 3 components each
        this.colors = new Float32Array(maxEdges * 6);
        this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
        this.geometry.setAttribute('color', new THREE.BufferAttribute(this.colors, 3));

        this.material = new THREE.LineBasicMaterial({
          vertexColors: true,
          transparent: true,
          opacity: 0.4,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        });

        this.mesh = new THREE.LineSegments(this.geometry, this.material);
        this.mesh.frustumCulled = false;
        scene.add(this.mesh);
      }

      update(nodeMap, edges, time) {
        const posAttr = this.geometry.attributes.position;
        const colAttr = this.geometry.attributes.color;

        edges.forEach((edge, i) => {
          const src = nodeMap.get(edge.source);
          const tgt = nodeMap.get(edge.target);
          if (!src || !tgt) return;

          const idx = i * 6;
          posAttr.array[idx] = src.x;
          posAttr.array[idx + 1] = src.y;
          posAttr.array[idx + 2] = src.z;
          posAttr.array[idx + 3] = tgt.x;
          posAttr.array[idx + 4] = tgt.y;
          posAttr.array[idx + 5] = tgt.z;

          // Color with subtle animation
          const pulse = 0.6 + 0.4 * Math.sin(time * 2 + i * 0.5);
          const alpha = edge.strength * pulse * 0.5;
          colAttr.array[idx] = 0.4 * alpha;
          colAttr.array[idx + 1] = 0.6 * alpha;
          colAttr.array[idx + 2] = 0.9 * alpha;
          colAttr.array[idx + 3] = 0.4 * alpha;
          colAttr.array[idx + 4] = 0.6 * alpha;
          colAttr.array[idx + 5] = 0.9 * alpha;
        });

        posAttr.needsUpdate = true;
        colAttr.needsUpdate = true;
      }
    }

    // ─── Node Renderer ──────────────────────────────────────────────────────
    class NodeRenderer {
      constructor(scene, nodes) {
        this.scene = scene;
        this.nodeGroups = new Map();

        nodes.forEach(node => {
          const group = new THREE.Group();
          group.userData = node;

          // Main sphere
          const size = TYPE_SIZES[node.type] || 0.8;
          const color = CATEGORY_COLORS[node.category] || new THREE.Color(0.5, 0.5, 0.5);
          const geometry = new THREE.SphereGeometry(size, 24, 24);
          const material = new THREE.MeshPhysicalMaterial({
            color,
            metalness: 0.3,
            roughness: 0.4,
            emissive: color,
            emissiveIntensity: 0.15,
            clearcoat: 0.5,
            clearcoatRoughness: 0.3,
          });
          const sphere = new THREE.Mesh(geometry, material);
          group.add(sphere);

          // Glow ring
          const ringGeometry = new THREE.RingGeometry(size * 1.2, size * 1.5, 32);
          const ringMaterial = new THREE.MeshBasicMaterial({
            color,
            transparent: true,
            opacity: 0.15,
            side: THREE.DoubleSide,
            depthWrite: false,
          });
          const ring = new THREE.Mesh(ringGeometry, ringMaterial);
          group.add(ring);

          // Label (using sprite)
          const canvas = document.createElement('canvas');
          canvas.width = 256;
          canvas.height = 64;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = 'rgba(0,0,0,0)';
          ctx.fillRect(0, 0, 256, 64);
          ctx.font = '600 24px Geist, Inter, sans-serif';
          ctx.fillStyle = '#e0e0e0';
          ctx.textAlign = 'center';
          ctx.fillText(node.name, 128, 40);

          const texture = new THREE.CanvasTexture(canvas);
          const spriteMaterial = new THREE.SpriteMaterial({
            map: texture,
            transparent: true,
            depthWrite: false,
          });
          const sprite = new THREE.Sprite(spriteMaterial);
          sprite.position.y = size + 1.5;
          sprite.scale.set(8, 2, 1);
          group.add(sprite);

          scene.add(group);
          this.nodeGroups.set(node.id, group);
        });
      }

      updatePositions(nodeMap) {
        nodeMap.forEach((node, id) => {
          const group = this.nodeGroups.get(id);
          if (group) {
            group.position.set(node.x, node.y, node.z);
          }
        });
      }

      highlight(nodeId, highlight) {
        this.nodeGroups.forEach((group, id) => {
          const sphere = group.children[0];
          const ring = group.children[1];
          if (id === nodeId) {
            sphere.material.emissiveIntensity = highlight ? 0.5 : 0.15;
            ring.material.opacity = highlight ? 0.4 : 0.15;
          } else {
            sphere.material.emissiveIntensity = 0.15;
            ring.material.opacity = 0.15;
            group.children[2].material.opacity = highlight ? 0.3 : 1;
          }
        });
      }

      getIntersected(raycaster) {
        const intersects = [];
        this.nodeGroups.forEach((group, id) => {
          const sphere = group.children[0];
          const hit = raycaster.intersectObject(sphere);
          if (hit.length > 0) {
            intersects.push({ id, group, distance: hit[0].distance });
          }
        });
        intersects.sort((a, b) => a.distance - b.distance);
        return intersects[0] || null;
      }
    }

    // ─── Main App ───────────────────────────────────────────────────────────
    class SkillNetworkApp {
      constructor() {
        this.container = document.getElementById('canvas-container');
        this.tooltip = document.getElementById('tooltip');
        this.loading = document.getElementById('loading');

        // Stats
        this.statsNodes = document.getElementById('stat-nodes');
        this.statsEdges = document.getElementById('stat-edges');
        this.statsFps = document.getElementById('stat-fps');

        // State
        this.hoveredNode = null;
        this.selectedNode = null;
        this.draggingNode = null;
        this.dragPlane = new THREE.Plane();
        this.dragOffset = new THREE.Vector3();
        this.raycaster = new THREE.Raycaster();
        this.mouse = new THREE.Vector2();
        this.mouseDown = new THREE.Vector2();
        this.time = 0;
        this.frameCount = 0;
        this.lastFpsTime = 0;
        this.activeCategories = new Set();
        this.searchQuery = '';

        this.init();
      }

      init() {
        this.setupRenderer();
        this.setupScene();
        this.setupControls();
        this.setupGraph();
        this.setupUI();
        this.setupEvents();
        this.animate();

        // Hide loading
        setTimeout(() => {
          this.loading.classList.add('hidden');
        }, 800);
      }

      setupRenderer() {
        this.renderer = new THREE.WebGLRenderer({
          antialias: true,
          alpha: false,
          powerPreference: 'high-performance',
        });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.outputColorSpace = THREE.SRGBColorSpace;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure = 1.2;
        this.container.appendChild(this.renderer.domElement);
      }

      setupScene() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x0a0a12);
        this.scene.fog = new THREE.FogExp2(0x0a0a12, 0.008);

        // Camera
        this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.camera.position.set(0, 15, 35);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        this.scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(10, 20, 10);
        this.scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x4080ff, 0.3);
        fillLight.position.set(-10, -5, -10);
        this.scene.add(fillLight);

        // Point lights for atmosphere
        const pointLight1 = new THREE.PointLight(0x00aaff, 0.5, 50);
        pointLight1.position.set(15, 10, 15);
        this.scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xff6040, 0.3, 50);
        pointLight2.position.set(-15, -10, -15);
        this.scene.add(pointLight2);
      }

      setupControls() {
        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;
        this.controls.dampingFactor = 0.05;
        this.controls.rotateSpeed = 0.8;
        this.controls.zoomSpeed = 1.2;
        this.controls.panSpeed = 0.8;
        this.controls.minDistance = 5;
        this.controls.maxDistance = 100;
        this.controls.enablePan = true;
        this.controls.target.set(0, 0, 0);
      }

      setupGraph() {
        // Create force graph
        this.graph = new ForceGraph(GRAPH_DATA.nodes, GRAPH_DATA.edges);

        // Pre-simulate to settle layout
        for (let i = 0; i < 200; i++) {
          this.graph.tick(1);
        }

        // Create renderers
        this.nodeRenderer = new NodeRenderer(this.scene, this.graph.nodes);
        this.edgeRenderer = new EdgeRenderer(this.scene, this.graph.edges.length);
        this.particleFlow = new ParticleFlow(this.scene, 3000);

        // Update stats
        this.statsNodes.textContent = this.graph.nodes.length;
        this.statsEdges.textContent = this.graph.edges.length;
      }

      setupUI() {
        // Category filter
        const categories = [...new Set(GRAPH_DATA.nodes.map(n => n.category))];
        const filterContainer = document.getElementById('category-filter');

        const allBtn = document.createElement('button');
        allBtn.className = 'category-btn active';
        allBtn.textContent = 'All';
        allBtn.addEventListener('click', () => {
          this.activeCategories.clear();
          filterContainer.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
          allBtn.classList.add('active');
        });
        filterContainer.appendChild(allBtn);

        categories.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'category-btn';
          btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
          btn.addEventListener('click', () => {
            if (this.activeCategories.has(cat)) {
              this.activeCategories.delete(cat);
              btn.classList.remove('active');
            } else {
              this.activeCategories.add(cat);
              btn.classList.add('active');
            }
            if (this.activeCategories.size === 0) {
              allBtn.classList.add('active');
            } else {
              allBtn.classList.remove('active');
            }
          });
          filterContainer.appendChild(btn);
        });
      }

      setupEvents() {
        window.addEventListener('resize', () => this.onResize());
        this.renderer.domElement.addEventListener('mousemove', (e) => this.onMouseMove(e));
        this.renderer.domElement.addEventListener('mousedown', (e) => this.onMouseDown(e));
        this.renderer.domElement.addEventListener('mouseup', (e) => this.onMouseUp(e));
        this.renderer.domElement.addEventListener('click', (e) => this.onClick(e));
        document.getElementById('search').addEventListener('input', (e) => this.onSearch(e));
      }

      onResize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        this.camera.aspect = width / height;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(width, height);
      }

      onMouseMove(e) {
        this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

        if (this.draggingNode) {
          this.raycaster.setFromCamera(this.mouse, this.camera);
          const intersect = new THREE.Vector3();
          this.raycaster.ray.intersectPlane(this.dragPlane, intersect);
          if (intersect) {
            this.draggingNode.x = intersect.x + this.dragOffset.x;
            this.draggingNode.y = intersect.y + this.dragOffset.y;
            this.draggingNode.z = intersect.z + this.dragOffset.z;
            this.draggingNode._fixed = true;
          }
          return;
        }

        // Hover detection
        this.raycaster.setFromCamera(this.mouse, this.camera);
        const hit = this.nodeRenderer.getIntersected(this.raycaster);

        if (hit) {
          this.hoveredNode = hit.id;
          this.nodeRenderer.highlight(hit.id, true);
          this.showTooltip(hit.id, e.clientX, e.clientY);
          this.renderer.domElement.style.cursor = 'grab';
        } else {
          this.hoveredNode = null;
          this.nodeRenderer.highlight(null, false);
          this.hideTooltip();
          this.renderer.domElement.style.cursor = 'default';
        }
      }

      onMouseDown(e) {
        if (e.button !== 0) return;
        this.mouseDown.set(e.clientX, e.clientY);

        if (this.hoveredNode) {
          const node = this.graph.nodeMap.get(this.hoveredNode);
          if (node) {
            this.draggingNode = node;
            this.controls.enabled = false;
            this.renderer.domElement.style.cursor = 'grabbing';

            // Set drag plane
            const cameraDir = new THREE.Vector3();
            this.camera.getWorldDirection(cameraDir);
            this.dragPlane.setFromNormalAndCoplanarPoint(cameraDir, new THREE.Vector3(node.x, node.y, node.z));

            // Calculate offset
            this.raycaster.setFromCamera(this.mouse, this.camera);
            const intersect = new THREE.Vector3();
            this.raycaster.ray.intersectPlane(this.dragPlane, intersect);
            this.dragOffset.set(node.x - intersect.x, node.y - intersect.y, node.z - intersect.z);
          }
        }
      }

      onMouseUp(e) {
        if (this.draggingNode) {
          this.draggingNode._fixed = false;
          this.draggingNode = null;
          this.controls.enabled = true;
          this.renderer.domElement.style.cursor = this.hoveredNode ? 'grab' : 'default';
        }
      }

      onClick(e) {
        const dist = this.mouseDown.distanceTo(new THREE.Vector2(e.clientX, e.clientY));
        if (dist > 5) return; // Was a drag, not a click

        if (this.hoveredNode) {
          this.selectedNode = this.selectedNode === this.hoveredNode ? null : this.hoveredNode;
        } else {
          this.selectedNode = null;
        }
      }

      onSearch(e) {
        this.searchQuery = e.target.value.toLowerCase();
      }

      showTooltip(nodeId, x, y) {
        const node = this.graph.nodeMap.get(nodeId);
        if (!node) return;

        const connections = this.graph.adjacency.get(nodeId)?.length || 0;

        document.getElementById('tooltip-name').textContent = node.name;
        document.getElementById('tooltip-category').textContent = node.category;
        document.getElementById('tooltip-strength').textContent = (node.strength * 100).toFixed(0) + '%';
        document.getElementById('tooltip-connections').textContent = connections;
        document.getElementById('tooltip-status').textContent = node.status;

        this.tooltip.style.left = (x + 16) + 'px';
        this.tooltip.style.top = (y - 16) + 'px';
        this.tooltip.classList.add('visible');
      }

      hideTooltip() {
        this.tooltip.classList.remove('visible');
      }

      animate() {
        requestAnimationFrame(() => this.animate());

        const now = performance.now();
        const dt = Math.min((now - (this._lastTime || now)) / 1000, 0.1);
        this._lastTime = now;
        this.time += dt;

        // FPS counter
        this.frameCount++;
        if (now - this.lastFpsTime > 500) {
          this.statsFps.textContent = Math.round(this.frameCount / ((now - this.lastFpsTime) / 1000));
          this.frameCount = 0;
          this.lastFpsTime = now;
        }

        // Force simulation (low alpha for stability)
        this.graph.tick(0.05);

        // Update renderers
        this.nodeRenderer.updatePositions(this.graph.nodeMap);
        this.edgeRenderer.update(this.graph.nodeMap, this.graph.edges, this.time);

        // Emit particles along edges
        if (Math.random() < 0.3) {
          const edge = this.graph.edges[Math.floor(Math.random() * this.graph.edges.length)];
          const src = this.graph.nodeMap.get(edge.source);
          const tgt = this.graph.nodeMap.get(edge.target);
          if (src && tgt) {
            const color = CATEGORY_COLORS[src.category] || new THREE.Color(0.4, 0.6, 0.9);
            this.particleFlow.emit(
              new THREE.Vector3(src.x, src.y, src.z),
              new THREE.Vector3(tgt.x, tgt.y, tgt.z),
              color,
              edge.strength
            );
          }
        }

        this.particleFlow.update(dt);

        // Node visibility based on filters
        this.graph.nodes.forEach(node => {
          const group = this.nodeRenderer.nodeGroups.get(node.id);
          if (!group) return;

          let visible = true;

          // Category filter
          if (this.activeCategories.size > 0 && !this.activeCategories.has(node.category)) {
            visible = false;
          }

          // Search filter
          if (this.searchQuery && !node.name.toLowerCase().includes(this.searchQuery)) {
            visible = false;
          }

          group.visible = visible;
        });

        // Update controls
        this.controls.update();

        // Render
        this.renderer.render(this.scene, this.camera);
      }
    }

    // ─── Start ──────────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      new SkillNetworkApp();
    });
  </script>
</body>
