# =============================================================================
# PHOENIX AIOS Grafana 数据源配置 — 自动配置数据源
# =============================================================================
# 数据源:
#   - Prometheus: 指标数据
#   - Loki: 日志数据
# =============================================================================

apiVersion: 1

datasources:
  # ── Prometheus 数据源 ───────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: '15s'
      queryTimeout: '60s'
      httpHeaderName1: 'X-Request-ID'

  # ── Loki 数据源 ────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: prometheus
          matcherRegex: "trace_id=(\\w+)"
          name: TraceID
          url: '$${__value.raw}'
