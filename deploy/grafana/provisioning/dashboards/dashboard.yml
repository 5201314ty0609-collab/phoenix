# =============================================================================
# PHOENIX AIOS Grafana 仪表盘配置 — 自动加载仪表盘
# =============================================================================

apiVersion: 1

providers:
  - name: 'PHOENIX AIOS'
    orgId: 1
    folder: 'PHOENIX'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
